<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prumo - Wizard Financeiro</title>
    <style>
        :root {
            --primary: #2ecc71;
            --bg: #f4f7f6;
            --dark: #2c3e50;
            --text: #34495e;
            --white: #ffffff;
            --danger: #e74c3c;
            --info: #3498db;
            --success: #27ae60;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; }

        .container { background: var(--white); width: 100%; max-width: 500px; padding: 25px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); align-self: center; position: relative; }

        .step { display: none; animation: fadeIn 0.4s ease; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 24px; color: var(--dark); margin-bottom: 8px; text-align: center; }
        .subtitle { font-size: 14px; color: #7f8c8d; margin-bottom: 15px; text-align: center; display: block; }

        input, select { width: 100%; padding: 14px; border: 2px solid #f1f2f6; border-radius: 12px; font-size: 16px; margin-bottom: 12px; outline: none; background: #f9f9f9; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: white; }

        /* Sliders Estilo Mobile */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; margin: 15px 0; }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: #eee; border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb { height: 26px; width: 26px; border-radius: 50%; background: var(--primary); cursor: pointer; -webkit-appearance: none; margin-top: -9px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); border: 2px solid white; }
        
        .rule-item { background: #fdfdfd; padding: 15px; border-radius: 20px; border: 1px solid #eee; margin-bottom: 12px; position: relative; }
        .rule-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .perc-display { font-weight: 900; color: var(--primary); font-size: 18px; }

        .total-bar { background: var(--dark); color: white; padding: 12px; border-radius: 15px; text-align: center; font-weight: bold; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }

        /* Estilos de Botão e Painel */
        .btn-next { background: var(--primary); color: white; width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 15px; margin-top: 10px; }
        .btn-back { background: #eee; color: #7f8c8d; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; flex: 1; }
        .btn-add { background: var(--dark); color: white; margin-bottom: 15px; width: 100%; padding: 15px; border-radius: 12px; border: none; cursor: pointer; }
        
        .main-panel { background: var(--dark); color: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; text-align: center; }
        .income-val { font-size: 32px; font-weight: 900; margin: 10px 0; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; font-size: 12px; }
        .stat-box b { display: block; font-size: 16px; }

        .category-item { background: #fff; border: 1px solid #eee; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .summary-card { padding: 18px; border-radius: 20px; margin-bottom: 12px; cursor: pointer; border: 2px solid transparent; }
        .summary-card.over-limit { border-color: var(--danger); background: #fff0f0 !important; color: var(--danger) !important; animation: shake 0.5s; }
        #detailPanel { display: none; margin-top: 15px; padding: 15px; background: #fff; border: 2px solid #f1f2f6; border-radius: 18px; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
    </style>
</head>
<body>

<div class="container">
    <div class="step active" id="stepAuth">
        <div style="text-align:center">
            <div style="font-size: 40px; font-weight: 900; color: var(--primary);">PRUMO</div>
            <h1>Acesse sua conta</h1>
            <input type="email" id="authEmail" placeholder="E-mail">
            <input type="password" id="authPassword" placeholder="Senha">
            <button class="btn-next" onclick="handleAuth()">Entrar</button>
        </div>
    </div>

    <div class="step" id="step0">
        <h1>Meu Painel</h1>
        <div class="main-panel">
            <small>RENDA DISPONÍVEL</small>
            <div class="income-val" id="dashIncome">R$ 0,00</div>
            <div class="stats-grid">
                <div class="stat-box">Gasto Total<b id="dashSpent">R$ 0,00</b></div>
                <div class="stat-box">Saldo Livre<b id="dashBalance">R$ 0,00</b></div>
            </div>
        </div>
        <button class="btn-next" onclick="nextStep(1)">Configurar Plano</button>
        <button class="btn-next" style="background: var(--dark)" onclick="nextStep(3)">Lançar Gastos</button>
    </div>

    <div class="step" id="step1">
        <h1>Configurar Plano</h1>
        <input type="number" id="income" placeholder="Sua Renda Líquida" oninput="saveIncomeToState()">
        
        <div class="total-bar">
            <span>DISTRIBUIÇÃO TOTAL</span>
            <span id="totalLabel">100%</span>
        </div>

        <div id="rulesList"></div>
        
        <button class="btn-add" onclick="addRule()">+ Nova Categoria</button>
        
        <div style="display:flex; gap:10px">
            <button class="btn-back" onclick="prevStep(0)">Voltar</button>
            <button class="btn-next" style="margin-top:0" onclick="nextStep(3)">Continuar</button>
        </div>
    </div>

    <div class="step" id="step3">
        <h1>Registrar Gastos</h1>
        <input type="text" id="expName" placeholder="O que comprou?">
        <input type="number" id="expVal" placeholder="Valor R$">
        <select id="expRule"></select>
        <button class="btn-add" onclick="addExpense()">+ Adicionar Gasto</button>
        <div id="expenseList"></div>
        <button class="btn-back" onclick="prevStep(1)">Voltar</button>
    </div>
</div>

<script type="module">
    // Mock de autenticação para funcionamento imediato
    window.handleAuth = () => { nextStep(0); };

    // Estado Global
    window.income = 0;
    window.rules = [
        { id: 1, name: "Essencial", perc: 70, color: "#e1f5fe" },
        { id: 2, name: "Metas", perc: 20, color: "#fff9c4" },
        { id: 3, name: "Lazer", perc: 10, color: "#e8f5e9" }
    ];
    window.expenses = [];

    // --- LÓGICA DE DISTRIBUIÇÃO (EXATAMENTE COMO O VÍDEO) ---
    
    window.renderRules = () => {
        const list = document.getElementById('rulesList');
        list.innerHTML = window.rules.map((r, i) => `
            <div class="rule-item">
                <div class="rule-header">
                    <input type="text" value="${r.name}" onchange="updateRuleName(${i}, this.value)" style="border:none; background:transparent; font-weight:bold; width:70%; margin-bottom:0; padding:0">
                    <span class="perc-display" id="val${i}">${r.perc}%</span>
                </div>
                <input type="range" min="0" max="100" value="${r.perc}" 
                       oninput="adjustRules(${i}, this.value)">
            </div>
        `).join('');
        
        // Atualiza o seletor de categorias na tela de gastos
        document.getElementById('expRule').innerHTML = window.rules.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
    };

    window.adjustRules = (changedIndex, newValue) => {
        newValue = parseInt(newValue);
        const oldValue = window.rules[changedIndex].perc;
        const delta = newValue - oldValue;

        if (delta === 0) return;

        // Identifica as outras categorias que podem ser ajustadas
        // Se aumentamos uma, as outras devem diminuir (se forem > 0)
        // Se diminuímos uma, as outras devem aumentar (se forem < 100)
        let otherRules = window.rules.filter((_, i) => i !== changedIndex);
        
        let remainingDelta = delta;

        // Tenta distribuir a diferença nas outras categorias proporcionalmente
        if (delta > 0) {
            // Aumentando: retira das outras proporcionalmente
            let totalAvailableToTake = otherRules.reduce((sum, r) => sum + r.perc, 0);
            if (totalAvailableToTake > 0) {
                otherRules.forEach(r => {
                    let reduction = (r.perc / totalAvailableToTake) * delta;
                    r.perc -= reduction;
                });
            } else {
                // Se as outras já estão em 0, não pode aumentar mais
                newValue = oldValue;
            }
        } else {
            // Diminuindo: adiciona nas outras proporcionalmente
            // Se as outras já somam 100, não faz nada, mas aqui distribuímos o "ganho"
            let totalSpace = otherRules.reduce((sum, r) => sum + (100 - r.perc), 0);
            otherRules.forEach(r => {
                let increase = ((100 - r.perc) / totalSpace) * Math.abs(delta);
                r.perc += increase;
            });
        }

        window.rules[changedIndex].perc = newValue;

        // Arredondamento para garantir que a soma seja exatamente 100
        normalizeRules();
        
        // Atualiza a interface visual sem dar "re-render" no DOM todo para não perder o foco
        window.rules.forEach((r, idx) => {
            const display = document.getElementById(`val${idx}`);
            if(display) display.innerText = Math.round(r.perc) + '%';
            const slider = document.querySelectorAll('input[type=range]')[idx];
            if(slider) slider.value = r.perc;
        });
        
        updateUI();
    };

    function normalizeRules() {
        // Garante inteiros e que a soma seja 100
        let total = 0;
        window.rules.forEach(r => {
            r.perc = Math.round(r.perc);
            total += r.perc;
        });

        // Ajuste fino se sobrar/faltar 1% devido ao arredondamento
        if (total !== 100) {
            window.rules[0].perc += (100 - total);
        }
    }

    window.addRule = () => {
        // Adiciona nova categoria com 0% e deixa o usuário distribuir
        window.rules.push({ id: Date.now(), name: "Nova Categoria", perc: 0, color: "#eee" });
        renderRules();
    };

    window.updateRuleName = (i, v) => { window.rules[i].name = v; };

    // --- FUNÇÕES DE INTERFACE GERAIS ---

    window.nextStep = (s) => {
        document.querySelectorAll('.step').forEach(d => d.classList.remove('active'));
        document.getElementById('step' + s).classList.add('active');
        if(s === 1) renderRules();
    };

    window.prevStep = (s) => nextStep(s);

    window.saveIncomeToState = () => {
        window.income = parseFloat(document.getElementById('income').value) || 0;
        updateUI();
    };

    window.addExpense = () => {
        const n = document.getElementById('expName').value;
        const v = parseFloat(document.getElementById('expVal').value);
        const r = parseInt(document.getElementById('expRule').value);
        if(!n || !v) return;
        window.expenses.push({id: Date.now(), name: n, val: v, ruleId: r});
        renderExpenses(); updateUI();
    };

    window.renderExpenses = () => {
        document.getElementById('expenseList').innerHTML = window.expenses.map(e => `
            <div class="category-item">
                <span><b>${e.name}</b></span>
                <b>R$ ${e.val.toFixed(2)}</b>
            </div>
        `).join('');
    };

    window.updateUI = () => {
        const spent = window.expenses.reduce((s, e) => s + e.val, 0);
        document.getElementById('dashIncome').innerText = window.income.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
        document.getElementById('dashSpent').innerText = spent.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
        document.getElementById('dashBalance').innerText = (window.income - spent).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    };

</script>
</body>
</html>
